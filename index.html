<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Karel Shop</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script>
    emailjs.init("8PVZSVdEcvULW0zPT"); // jouw Public Key
  </script>
  <script defer src="script.js"></script>
</head>
<body>
  <header>
    <h1>Karel Shop</h1>
    <p>Welkom bij de officiële Karel de Kikker shop</p>
  </header>

  <main>
  <section id="products">
    <div class="product" data-name="Karel T-shirt" data-price="19.99">
      <img src="Tshirt.png" alt="Karel T-shirt">
      <h3>Karel T-shirt</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>

    <div class="product" data-name="Karel Pet" data-price="14.99">
      <img src="Pet.png" alt="Karel Pet">
      <h3>Karel Pet</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>

     <div class="product" data-name="Karel Trui" data-price="39.99">
      <img src="Trui.png" alt="Karel Trui">
      <h3>Karel Trui</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>
    
    <div class="product" data-name="Karel Tesla" data-price="100.000.000">
      <img src="Tesla.png" alt="Karel Tesla">
      <h3>Karel Tesla</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>

    <div class="product" data-name="Karel Stickers" data-price="2.99">
      <img src="Stickers.png" alt="Karel Stickers">
      <h3>Karel Stickers</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>

     <div class="product" data-name="KarelRaket" data-price="2.99">
      <img src="Raket.png" alt="KarelRaket">
      <h3>KarelRaket</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>

    <div class="product" data-name="KarelHanger" data-price="4.99">
      <img src="KarelHanger.png" alt="KarelHanger">
      <h3>KarelHanger</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>

    <div class="product" data-name="Karel Hoodie" data-price="39.99">
      <img src="Hoodie.png" alt="Karel Hoodie">
      <h3>Karel Hoodie</h3>
      <button class="add-to-cart">Toevoegen</button>
      <button class="add-to-favorite">❤️</button>
    </div>
  </section>

  <aside id="cart">
    <ul id="cart-items"></ul>
    <p class="cart-total">Totaal: <span id="cart-total">€0,00</span></p>
    <button id="checkout">Afrekenen</button>
  </aside>

  <aside id="favorites">
    <ul id="favorite-items"></ul>
  </aside>

  <div id="address-modal" class="overlay">
    <div class="modal">
      <form id="address-form">
        <label>Naam <input type="text" id="name" required /></label>
        <label>Adres <input type="text" id="street" required /></label>
        <label>Postcode <input type="text" id="postcode" required /></label>
        <label>Woonplaats <input type="text" id="city" required /></label>
        <div class="modal-actions">
          <button type="button" id="cancel-address">Annuleren</button>
          <button type="submit">Bestellen</button>
        </div>
      </form>
    </div>
  </div>
</main>
</body>
</html>
