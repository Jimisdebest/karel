<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Karel Shop</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script>
    emailjs.init("8PVZSVdEcvULW0zPT"); // jouw Public Key
  </script>
  <script defer src="script.js"></script>
</head>
<body>
  <header>
    <h1>Karel Shop</h1>
    <p>Welkom bij de officiële Karel de Kikker shop</p>
  </header>

  <main>
    <section id="products">
      <h2>🛍️ Producten</h2>
      <div class="product" data-name="Karel T-shirt" data-price="19.99">
        <img src="Tshirt.png" alt="Karel T-shirt">
        <h3>Karel T-shirt</h3>
        <button class="add-to-cart">Toevoegen</button>
        <button class="add-to-favorite">❤️</button>
      </div>
      <!-- Voeg meer producten toe zoals hierboven -->
    </section>

    <aside id="cart">
      <h2>🛒 Winkelmandje</h2>
      <ul id="cart-items"></ul>
      <p class="cart-total">Totaal: <span id="cart-total">€0,00</span></p>
      <button id="checkout">Afrekenen</button>
    </aside>

    <aside id="favorites">
      <h2>⭐️ Favorieten</h2>
      <ul id="favorite-items"></ul>
    </aside>

    <div id="address-modal" class="overlay">
      <div class="modal">
        <h3>Bezorgadres</h3>
        <form id="address-form">
          <label>Naam <input type="text" id="name" required /></label>
          <label>Adres <input type="text" id="street" required /></label>
          <label>Postcode <input type="text" id="postcode" required /></label>
          <label>Woonplaats <input type="text" id="city" required /></label>
          <div class="modal-actions">
            <button type="button" id="cancel-address">Annuleren</button>
            <button type="submit">Bestellen</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
